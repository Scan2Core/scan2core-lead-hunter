name: Scan2Core Daily Lead Hunt

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily hunt
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python daily_lead_hunter.py

      - name: Commit found projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Scan2Core Bot"
          git config user.email "scan2core@automation.local"
          git add found_projects.json || true
          git commit -m "Update found projects - $(date +'%Y-%m-%d')" || true
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/Scan2Core/scan2core-lead-hunter.git main || true
        continue-on-error: true

name: Scan2Core Daily Lead Hunt

# Runs every day at 19:22 UTC, and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '22 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install Chromium + the system libraries it needs (libXdamage, etc.).
          python -m playwright install --with-deps chromium

      - name: Run daily hunt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_lead_hunter.py

      - name: Commit found projects
        run: |
          git config user.name "Scan2Core Bot"
          git config user.email "bot@scan2core.local"
          git add found_projects.json
          git diff --quiet --cached || git commit -m "Update found projects - $(date +%Y-%m-%d)"
          git push
